<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zygoplanner Demo</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f5f5f5}
    header{background:#111;color:#fff;padding:20px;text-align:center}
    main{max-width:900px;margin:40px auto;background:#fff;padding:30px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
    h1{margin-top:0}
    .upload{border:2px dashed #ccc;border-radius:8px;padding:40px;text-align:center}
    button{background:#2563eb;color:white;border:none;padding:12px 20px;border-radius:6px;font-size:16px;cursor:pointer}
    button:hover{background:#1d4ed8}
    .result{margin-top:20px;padding:15px;background:#f1f5f9;border-radius:6px}
  </style>
</head>
<body>
  <header>
    <h1>Zygoplanner AI Planning Demo</h1>
  </header>
  <main>
    <h2>Upload CBCT (Demo)</h2>
    <div class="upload">
      <input id="file" type="file" />
      <p>Upload a CBCT file (demo only)</p>
      <button onclick="runDemo()">Run AI Planning</button>
    </div>
    <div id="output" class="result" style="display:none"></div>
  </main>

  <script>
    function runDemo(){
      const file=document.getElementById('file').files[0];
      const out=document.getElementById('output');

      if(!file){
        alert('Please upload a file first');
        return;
      }

      out.style.display='block';
      out.innerHTML='Processing with AI planner...';

      setTimeout(()=>{
        out.innerHTML=`\n          <b>Planning Complete</b><br/><br/>
          Suggested Zygomatic Implant Path:<br/>
          Entry Point: (32.1, 45.2, 18.4)<br/>
          Target Point: (65.3, 72.1, 40.2)<br/>
          Safety Distance to Orbit: 3.4 mm<br/>
          Estimated BIC: 58%\n        `;
      },1500);
    }

    // Basic tests
    function testRunDemoNoFile(){
      try{
        document.getElementById('file').value='';
        runDemo();
        console.log('Test passed: no crash when no file');
      }catch(e){
        console.error('Test failed',e);
      }
    }

    window.onload=testRunDemoNoFile;
  </script>
</body>
</html>
